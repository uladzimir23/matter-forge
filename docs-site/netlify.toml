[build]
  base = "docs-site"
  command = "npm ci && npm run build"
  publish = "out"
  # docs-site рендерит MDX из ../docs/, поэтому rebuild нужен при
  # изменении samой docs-site/, и при изменении docs/.
  # exit 0 — skip, exit non-zero — build.
  ignore = "git -C .. diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- docs-site docs"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"
